<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>БИЛКА — Домашен билков справочник</title>
<meta name="description" content="Домашен справочник за билки и народни рецепти. Търсене по билка или по оплакване. Работи офлайн.">
<style>
:root{
  --paper:#FDFBF6;
  --ink:#22301F;
  --green:#2E5B34;
  --green-dark:#1E4023;
  --red:#A8322D;
  --gold:#B77F24;
  --line:#E4DECE;
  --card:#FFFFFF;
  --warn-bg:#FBF0EF;
  --recipe-bg:#F3F6EF;
  --fs:17px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:var(--fs)}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--paper);color:var(--ink);line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.serif{font-family:Georgia,"Times New Roman",serif}
mark{background:#F5E3B3;color:inherit;border-radius:3px;padding:0 2px}

/* Шевица — български бродиран мотив, чист CSS */
.shevitsa{
  height:14px;
  background:
    linear-gradient(45deg, var(--red) 25%, transparent 25%, transparent 75%, var(--red) 75%),
    linear-gradient(-45deg, var(--red) 25%, transparent 25%, transparent 75%, var(--red) 75%);
  background-size:14px 14px;
  background-color:var(--green-dark);
}

header{
  background:var(--green-dark);color:#F6F2E6;
  padding:1rem 1rem .8rem;text-align:center;
}
header h1{font-family:Georgia,serif;font-size:2rem;letter-spacing:.18em;font-weight:700}
header p{font-size:.8rem;opacity:.85;margin-top:.1rem}

.topbar{
  position:sticky;top:0;z-index:50;background:var(--paper);
  border-bottom:2px solid var(--line);
  padding:.7rem .9rem .6rem;
}
.searchwrap{position:relative}
#search{
  width:100%;font-size:1.05rem;padding:.7rem 2.8rem .7rem 1rem;
  border:2px solid var(--green);border-radius:14px;background:#fff;color:var(--ink);
  outline:none;
}
#search:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(183,127,36,.25)}
#clearbtn{
  position:absolute;right:.4rem;top:50%;transform:translateY(-50%);
  border:none;background:var(--line);color:var(--ink);
  width:2rem;height:2rem;border-radius:50%;font-size:1.05rem;cursor:pointer;display:none;
}
.tabs{display:flex;gap:.5rem;margin-top:.6rem}
.tab{
  flex:1;padding:.55rem .3rem;font-size:.95rem;font-weight:700;
  border:2px solid var(--green);border-radius:12px;background:#fff;color:var(--green);
  cursor:pointer;text-align:center;transition:background .15s,color .15s;
}
.tab.active{background:var(--green);color:#fff}
.tab.fav{flex:0 0 auto;padding:.55rem .8rem;border-color:var(--gold);color:var(--gold)}
.tab.fav.active{background:var(--gold);color:#fff}
.fontbtn{
  flex:0 0 auto;padding:.55rem .7rem;font-weight:700;border:2px solid #9aa08a;
  border-radius:12px;background:#fff;color:#6b705c;cursor:pointer;font-size:.95rem;
}
main{max-width:680px;margin:0 auto;padding:.9rem .9rem 4rem}

.count{font-size:.85rem;color:#6b705c;margin:.2rem 0 .6rem}

/* Билка на деня */
.today{
  background:linear-gradient(135deg,#F3F6EF,#EDE9DB);
  border:2px solid var(--gold);border-radius:16px;
  padding:.9rem 1rem;margin-bottom:.9rem;cursor:pointer;
  display:flex;gap:.9rem;align-items:center;
}
.today .badge{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:800}
.today h3{font-family:Georgia,serif;font-size:1.25rem;color:var(--green-dark)}
.today p{font-size:.9rem;color:#55604d}
.today img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex:0 0 auto}

/* Списък билки */
.herb-card{
  background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:.8rem .9rem;margin-bottom:.65rem;cursor:pointer;
  display:flex;gap:.8rem;align-items:center;
  transition:border-color .15s, transform .12s;
  animation:rise .25s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.herb-card:hover,.herb-card:focus-visible{border-color:var(--green)}
.herb-card:active{transform:scale(.985)}
.herb-card .txt{flex:1;min-width:0}
.herb-card h3{font-family:Georgia,serif;font-size:1.15rem;color:var(--green-dark);display:flex;align-items:center;gap:.35rem}
.herb-card h3 .star{color:var(--gold);font-size:.9rem}
.herb-card .lat{font-style:italic;font-size:.82rem;color:#7a7f6a}
.herb-card .uses{font-size:.9rem;margin-top:.2rem;color:#4a5442}
.herb-card img{
  width:60px;height:60px;border-radius:12px;object-fit:cover;flex:0 0 auto;
  border:1.5px solid var(--line);background:#EEF2E6;
}

/* Оплаквания — акордеон */
.ail-card{
  background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  margin-bottom:.65rem;overflow:hidden;
}
.ail-head{
  width:100%;display:flex;align-items:center;gap:.6rem;
  padding:.85rem 1rem;background:none;border:none;cursor:pointer;
  font-size:1.05rem;font-family:Georgia,serif;color:var(--red);font-weight:700;text-align:left;
}
.ail-head .arrow{margin-left:auto;color:#9aa08a;transition:transform .2s;font-size:.9rem}
.ail-card.open .arrow{transform:rotate(90deg)}
.ail-body{display:none;padding:0 1rem .9rem}
.ail-card.open .ail-body{display:block;animation:rise .2s ease both}
.ail-body .desc{font-size:.88rem;color:#6b705c;margin-bottom:.55rem}
.chips{display:flex;flex-wrap:wrap;gap:.45rem}
.chip{
  border:1.5px solid var(--green);color:var(--green-dark);background:#fff;
  border-radius:999px;padding:.35rem .8rem;font-size:.92rem;font-weight:600;cursor:pointer;
  transition:background .15s,color .15s;
}
.chip:hover{background:var(--green);color:#fff}

/* Детайл на билка */
#detail{display:none;animation:rise .25s ease both}
.dtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;gap:.6rem}
.backbtn{
  display:inline-flex;align-items:center;gap:.4rem;
  border:2px solid var(--green);background:#fff;color:var(--green-dark);
  font-size:.95rem;font-weight:700;padding:.5rem 1rem;border-radius:12px;cursor:pointer;
}
.favbtn{
  border:2px solid var(--gold);background:#fff;color:var(--gold);
  font-size:.95rem;font-weight:700;padding:.5rem .9rem;border-radius:12px;cursor:pointer;
  transition:background .15s,color .15s;
}
.favbtn.on{background:var(--gold);color:#fff}
.dphoto{
  width:100%;max-height:230px;object-fit:cover;border-radius:16px;
  border:1.5px solid var(--line);margin-bottom:.9rem;background:#EEF2E6;
}
.dhead h2{font-family:Georgia,serif;font-size:1.6rem;color:var(--green-dark);line-height:1.25}
.dhead .lat{font-style:italic;color:#7a7f6a;font-size:.92rem}
.dhead .folk{font-size:.88rem;color:#6b705c;margin-top:.15rem}
.section{margin-top:1rem}
.section h4{
  font-size:.8rem;letter-spacing:.09em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.3rem;font-weight:800;
}
.section p, .section li{font-size:.98rem}
.section ul{padding-left:1.2rem}
.recipe{background:var(--recipe-bg);border:1.5px solid #CBD8C0;border-radius:14px;padding:.9rem 1rem}
.recipe h4{color:var(--green)}
.recipe p{white-space:pre-line}
.warn{background:var(--warn-bg);border:1.5px solid #E3B8B5;border-radius:14px;padding:.9rem 1rem}
.warn h4{color:var(--red)}

/* Отровни растения — червена предупредителна тема */
.tab.danger{flex:0 0 auto;padding:.55rem .8rem;border-color:var(--red);color:var(--red)}
.tab.danger.active{background:var(--red);color:#fff}
.poison-note{
  background:var(--warn-bg);border:1.5px solid #E3B8B5;border-left:5px solid var(--red);
  border-radius:12px;padding:.85rem 1rem;margin-bottom:.9rem;font-size:.95rem;
}
.poison-note b{color:var(--red)}
.poison-card{
  display:flex;gap:.8rem;align-items:flex-start;
  background:var(--warn-bg);border:1.5px solid #E3B8B5;border-left:5px solid var(--red);
  border-radius:14px;padding:.85rem .9rem;margin-bottom:.7rem;cursor:pointer;
}
.poison-card .skull{font-size:1.6rem;line-height:1;flex:0 0 auto;margin-top:.1rem}
.poison-card .pthumb{width:64px;height:64px;object-fit:cover;border-radius:10px;flex:0 0 auto;border:1px solid #E3B8B5}
.photo-credit{font-size:.72rem;color:#8a7a6a;text-align:right;margin:-.4rem 0 .6rem;opacity:.85}
.poison-card h3{font-size:1.08rem;color:var(--red)}
.poison-card .lat{font-style:italic;color:#8a6a3a;font-size:.85rem;margin:.05rem 0 .25rem}
.poison-card .why{font-size:.92rem}
.dbadge{
  display:inline-block;background:var(--red);color:#fff;font-size:.78rem;font-weight:700;
  padding:.2rem .6rem;border-radius:999px;margin-bottom:.4rem;letter-spacing:.02em;
}
.section.danger{background:var(--warn-bg);border:1.5px solid #E3B8B5;border-left:5px solid var(--red);border-radius:14px;padding:.9rem 1rem}
.section.danger h4{color:var(--red)}
.section.confuse{background:#FFF7E8;border:1.5px solid #EAD9A6;border-left:5px solid var(--gold);border-radius:14px;padding:.9rem 1rem}
.section.confuse h4{color:var(--gold)}
.tagrow{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.8rem}
.tag{background:#EEF2E6;color:var(--green-dark);border-radius:999px;padding:.25rem .7rem;font-size:.82rem;font-weight:600;border:none;cursor:pointer}
.tag:hover{background:var(--green);color:#fff}
.navrow{display:flex;justify-content:space-between;gap:.6rem;margin-top:1.4rem}
.navrow button{
  flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;
  padding:.55rem;font-size:.88rem;color:var(--green-dark);cursor:pointer;font-weight:600;
}

.empty{text-align:center;color:#6b705c;padding:2.5rem 1rem;font-size:.95rem}

#totop{
  position:fixed;right:1rem;bottom:1.2rem;z-index:60;display:none;
  width:2.9rem;height:2.9rem;border-radius:50%;border:none;cursor:pointer;
  background:var(--green);color:#fff;font-size:1.2rem;box-shadow:0 3px 10px rgba(0,0,0,.25);
}

footer{
  max-width:680px;margin:0 auto;padding:1rem .9rem 2.5rem;
  font-size:.72rem;color:#9aa08a;border-top:1px solid var(--line);text-align:center;
}

body.big{--fs:21px}

@media (prefers-reduced-motion: reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>
<body>

<header>
  <h1>БИЛКА</h1>
  <p>Домашен билков справочник · работи без интернет</p>
</header>
<div class="shevitsa" aria-hidden="true"></div>

<div class="topbar">
  <div class="searchwrap">
    <input id="search" type="search" placeholder="Търси билка или оплакване…" autocomplete="off" aria-label="Търсене по билка или оплакване">
    <button id="clearbtn" aria-label="Изчисти търсенето">✕</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tabHerbs">🌿 Билки</button>
    <button class="tab" id="tabAils">🤒 Оплаквания</button>
    <button class="tab danger" id="tabPoison" title="Отровни растения">☠️</button>
    <button class="tab fav" id="tabFavs" title="Любими">★</button>
    <button class="fontbtn" id="fontbtn" title="По-едри букви" aria-label="По-едри букви">А+</button>
  </div>
</div>

<main>
  <div id="listview">
    <div id="todaybox"></div>
    <p class="count" id="count"></p>
    <div id="results"></div>
  </div>
  <div id="detail" aria-live="polite"></div>
</main>

<button id="totop" aria-label="Към началото">↑</button>

<footer>
  <p>С образователна цел. Не замества консултация с лекар.</p>
</footer>

 dose:"По 1 чаша 2 пъти дневно. Ефектът върху настроението идва след 2–4 седмици.",
 warn:"ВНИМАНИЕ: взаимодейства с много лекарства и намалява действието им — антидепресанти, лекарства за разреждане на кръвта, за сърце, за кръвно, противозачатъчни и други. Ако приемате каквито и да е лекарства — задължително питайте лекар/фармацевт. Прави кожата чувствителна към слънце.",
 ail:["настроение","кожа"]},

{id:"glog", n:"Глог", lat:"Crataegus monogyna / laevigata", folk:"боже дръвце",
 what:"Билката на сърцето — подкрепя сърдечната дейност и леко смъква кръвното при продължителна употреба.",
 uses:["леко повишено кръвно","сърцебиене от напрежение","подкрепа на сърцето при възрастни"],

{id:"shipka", n:"Шипка", lat:"Rosa canina", folk:"дива роза",
 what:"Най-богатият ни природен източник на витамин C — за имунитет и тонус през зимата.",
 uses:["укрепване на имунитета","възстановяване след боледуване","обща отпадналост"],
 prep:"2–3 супени лъжици счукани плодове на 500 мл вода. Ври само 5 минути на тих огън (дългото варене унищожава витамин C) или се запарва в термос за една нощ.",
 dose:"По 1 чаша 2–3 пъти дневно, може подсладена с мед.",
 warn:"Много безопасна. Прецеждайте през гъста цедка или марля — власинките от семките дразнят гърлото.",

{id:"lipa", n:"Липа", lat:"Tilia cordata / platyphyllos", folk:"липов цвят",
 what:"Първа помощ при настинка — гореща липа кара тялото да се изпоти и облекчава температурата.",
 uses:["настинка и грип","температура (потогонно)","суха кашлица","неспокойствие"],
 prep:"Чай: 1–2 чаени лъжички цвят на 250 мл вряла вода, покрито 10 минути.",
 dose:"При простуда: 1 голяма чаша гореща, с мед и лимон, 2–3 пъти дневно, най-добре преди лягане под завивка.",
 warn:"Безопасна билка за ежедневна употреба.",
 ail:["простуда","температура","кашлица","сън"]},

{id:"baz", n:"Бъз (черен)", lat:"Sambucus nigra", folk:"свирчина, бъзак",
 what:"Двойна билка: цветът е потогонен при простуда, а тъмните плодове са мощен антиоксидант (антоциани) и класика при грип. В народната медицина плодовете се ползват и за прочистване от паразити.",
 uses:["настинка и грип (цвят — потогонно)","температура","силен антиоксидант (плодове)","подкрепа на имунитета","народно средство за прочистване от паразити (плодове)"],
 prep:"ЧАЙ ОТ ЦВЯТ: 2 чаени лъжички сушен цвят на 250 мл вряла вода, покрито 10 минути.\n\nСИРОП ОТ ПЛОДОВЕ: зрелите плодове се варят с малко вода 15–20 минути, прецеждат се, към сока се добавя захар (около 1:1) и се вари до сгъстяване.\n\nБЪЗАК СЪС ЗАХАР („на вино\"): пластове зрели плодове и захар в голям буркан, оставя се да ферментира; получената напитка се прецежда и съхранява на хладно.",
 dose:"Чай — по 1 гореща чаша 2–3 пъти дневно при простуда. Сироп — по 1 супена лъжица 2–3 пъти дневно. Ферментиралият бъзак — по малка чашка.",
 warn:"Само топлинно обработени или ферментирали плодове! Сурови плодове, листа и кора предизвикват гадене и повръщане. Ферментиралият бъзак съдържа алкохол — не за деца, не с лекарства, не при бременност. Противопаразитното действие е традиционна употреба, не заместител на изследване и лечение при доказани паразити.",
 ail:["простуда","температура","имунитет","паразити"]},

{id:"mashterka", n:"Мащерка", lat:"Thymus serpyllum / vulgaris", folk:"бабина душица",

 dose:"По 1 чаша 3 пъти дневно, докато трае кашлицата.",

{id:"zhivovlyak", n:"Живовляк (теснолист)", lat:"Plantago lanceolata", folk:"жиловлек, петопръстник",

{id:"ravnets", n:"Бял равнец", lat:"Achillea millefolium", folk:"хайдушка трева, посечена трева",

{id:"ehinatseya", n:"Ехинацея", lat:"Echinacea purpurea", folk:"—",

{id:"dzhindzhifil", n:"Джинджифил", lat:"Zingiber officinale", folk:"—",

{id:"mecho-grozde", n:"Мечо грозде", lat:"Arctostaphylos uva-ursi", folk:"мечо ухо",

 signs:["гадене, повръщане, коремни болки","нарушен и забавен пулс","замъглено или жълто-зелено виждане","обърканост","при тежко — спиране на сърцето"]},

{id:"momina-salza", n:"Момина сълза", lat:"Convallaria majalis", folk:"момкова сълза",
 danger:"Силно отровно — цялото растение, включително водата във вазата.",
 what:"Ароматните бели камбанки са красиви, но съдържат сърдечни отрови, подобни на напръстника. Всяка година има отравяния при бъркане на листата.",
 confuse:"Листата преди цъфтеж се бъркат с мечи лук (левурда) и с черемша при бране за салата.",
 signs:["гадене и повръщане","коремни болки и диария","забавен, неравномерен пулс","замайване","нарушение на сърдечния ритъм"]},

{id:"esenen-minzuhar", n:"Есенен минзухар", lat:"Colchicum autumnale", folk:"циклама, гологлавче",
 danger:"Смъртоносно отровно — цялото растение.",
 what:"Разцъфва наесен с бледолилави цветове без листа. Съдържа колхицин — отрова без противоотрова, с коварно забавено действие след часове.",
 confuse:"Листата напролет се бъркат с мечи лук; луковицата — с лук; цветът — с шафран.",
 signs:["часове по-късно — парене в устата и гърлото","силно повръщане и водниста диария","обезводняване","отказ на органи след 1–2 дни"]},

{id:"samakitka", n:"Самакитка (Аконит)", lat:"Aconitum", folk:"вълчи корен, калугерка",
 danger:"Едно от най-силните растителни отрови — смъртоносно.",
 what:"Тъмносини шлемовидни цветове. Отровата (аконитин) прониква дори през кожата. Достатъчен е малко корен, за да убие възрастен човек.",
 confuse:"Коренът се бърка с хрян или репички; цветята се берат за букети.",
 signs:["изтръпване и парене на устата и езика","мравучкане по кожата","гадене и повръщане","нарушен сърдечен ритъм","затруднено дишане"]},

{id:"chemerika", n:"Чемерика (бяла)", lat:"Veratrum album", folk:"кукуряк планински, чемерига",
 danger:"Силно отровно — цялото растение, особено коренът.",
 what:"Едри нагънати листа и висок цветонос в планините. Използвана е народно като „лек“, но е тежка отрова за сърцето и стомаха.",
 confuse:"Коренът се бърка с корен от жълта тинтява (горчивка) при домашно приготвяне на ракия и настойки — класическа причина за отравяния.",
 signs:["парене в устата, слюноотделяне","упорито повръщане","силно забавен пулс и ниско кръвно","замайване, изпотяване, изстиване"]},

{id:"tis", n:"Тис (отровен)", lat:"Taxus baccata", folk:"негной, отровачка",
 danger:"Смъртоносно отровно — иглите и семето (не червената обвивка).",
 what:"Иглолистно дърво или жив плет в паркове и дворове. Съдържа таксин, който спира сърцето. Няма ефективна противоотрова.",
 confuse:"Червените месести „плодове“ привличат деца; иглите се бъркат с други иглолистни за чай.",
 signs:["гадене и коремни болки","замайване","нарушен и забавящ се пулс","внезапно спиране на сърцето"]},

{id:"kukuryak", n:"Кукуряк", lat:"Helleborus", folk:"смок, зимниче",
 danger:"Отровно — цялото растение.",
 what:"Ранопролетно цвете, което народната традиция погрешно смята за „лечебно“. Дразни силно кожата и лигавиците и разстройва сърцето. Не е за домашно лечение.",
 confuse:"Народни рецепти го препоръчват вътрешно — точно това е опасно.",
 signs:["парене в устата и гърлото","силно повръщане и диария","забавен, неравномерен пулс","замайване"]}
];

// Вградени снимки на отровните растения (base64). Попълва се от embed_poison_photos.py.
// Формат: { "id": {src:"data:image/jpeg;base64,...", credit:"Автор", license:"CC BY-SA 4.0", source:"URL"} }
window.POISON_PHOTOS = window.POISON_PHOTOS || {};

// ================= ЛОГИКА =================
const $=id=>document.getElementById(id);
const results=$("results"), detail=$("detail"), listview=$("listview"),
      search=$("search"), clearbtn=$("clearbtn"), count=$("count"),
      todaybox=$("todaybox");
let mode="herbs";
let openAils=new Set();

// Безопасно съхранение (работи на GitHub Pages; в среди без localStorage тихо пази само за сесията)
const store={
  get(k){try{return localStorage.getItem(k)}catch(e){return this._m&&this._m[k]||null}},
  set(k,v){try{localStorage.setItem(k,v)}catch(e){this._m=this._m||{};this._m[k]=v}}
};
let favs=new Set();
try{favs=new Set(JSON.parse(store.get("bilka_favs")||"[]"))}catch(e){}
function saveFavs(){store.set("bilka_favs",JSON.stringify([...favs]))}

function norm(s){return s.toLowerCase().replace(/\s+/g," ").trim()}
function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function hl(text,q){
  if(!q)return text;
  const i=norm(text).indexOf(q);
  if(i<0)return text;
  return text.slice(0,i)+"<mark>"+text.slice(i,i+q.length)+"</mark>"+text.slice(i+q.length);
}
function ailTitle(k){const a=AILMENTS.find(x=>x.k===k);return a?a.t:k}
function img(h,cls){
  return `<img class="${cls}" src="img/${h.id}.jpg" alt="${esc(h.n)}" loading="lazy" onerror="this.style.display='none'">`;
}

function herbCard(h,i,q){
  return `<div class="herb-card" role="button" tabindex="0" onclick="openHerb(${i})" onkeydown="if(event.key==='Enter')openHerb(${i})">
    <div class="txt">
      <h3>${favs.has(h.id)?'<span class="star">★</span>':''}${hl(h.n,q)}</h3>
      <div class="lat">${hl(h.lat,q)}${h.folk&&h.folk!=="—"?" · нар. "+hl(h.folk,q):""}</div>
      <div class="uses">${hl(h.uses.slice(0,3).join(" · "),q)}</div>
    </div>
    ${img(h,"")}
  </div>`;
}

function ailCard(a,forceOpen){
  const herbs=HERBS.map((h,i)=>({h,i})).filter(x=>x.h.ail.includes(a.k));
  if(!herbs.length)return"";
  const open=forceOpen||openAils.has(a.k);
  return `<div class="ail-card ${open?"open":""}" id="ail-${a.k}">
    <button class="ail-head" onclick="toggleAil('${a.k}')" aria-expanded="${open}">
      <span>${a.icon}</span><span>${a.t}</span><span class="arrow">▶</span>
    </button>
    <div class="ail-body">
      <p class="desc">${a.d}</p>
      <div class="chips">${herbs.map(x=>`<button class="chip" onclick="openHerb(${x.i})">${x.h.n}</button>`).join("")}</div>
    </div>
  </div>`;
}

function toggleAil(k){
  openAils.has(k)?openAils.delete(k):openAils.add(k);
  document.getElementById("ail-"+k).classList.toggle("open");
}

function todayHerb(){
  const d=new Date();
  const dayN=Math.floor(d.getTime()/86400000);
  return dayN%HERBS.length;
}
function renderToday(){
  if(mode!=="herbs"||norm(search.value)){todaybox.innerHTML="";return}
  const i=todayHerb(),h=HERBS[i];
  todaybox.innerHTML=`<div class="today" role="button" tabindex="0" onclick="openHerb(${i})" onkeydown="if(event.key==='Enter')openHerb(${i})">
    ${img(h,"")}
    <div>
      <div class="badge">Билка на деня</div>
      <h3>${h.n}</h3>
      <p>${h.what}</p>
    </div>
  </div>`;
}

function poisonPhoto(p){
  return (window.POISON_PHOTOS && window.POISON_PHOTOS[p.id]) || null;
}
function poisonImg(p,cls){
  const ph=poisonPhoto(p);
  const src = ph ? ph.src : `img/${p.id}.jpg`;
  return `<img class="${cls}" src="${src}" alt="${esc(p.n)}" loading="lazy" onerror="this.style.display='none'">`;
}

function poisonCard(p,i,q){
  const ph=poisonPhoto(p);
  return `<div class="poison-card" role="button" tabindex="0" onclick="openPoison(${i})" onkeydown="if(event.key==='Enter')openPoison(${i})">
    ${ph?`<img class="pthumb" src="${ph.src}" alt="${esc(p.n)}" loading="lazy">`:`<div class="skull" aria-hidden="true">☠️</div>`}
    <div>
      <h3>${hl(p.n,q)}</h3>
      <div class="lat">${hl(p.lat,q)}${p.folk&&p.folk!=="—"?" · нар. "+hl(p.folk,q):""}</div>
      <div class="why">${hl(p.danger,q)}</div>
    </div>
  </div>`;
}

const POISON_INTRO=`<div class="poison-note"><b>☠️ Тези растения не са билки.</b> Изброени са само за разпознаване. <b>Не се използват за чай, компрес или ракия под никаква форма.</b> При съмнение за отравяне — веднага <b>звъннете на 112</b> (Клиника по токсикология „Пирогов“). Не предизвиквайте повръщане без указание.</div>`;

function openPoison(i){
  const p=POISON[i];
  const prev=(i-1+POISON.length)%POISON.length, next=(i+1)%POISON.length;
  detail.innerHTML=`
    <div class="dtop">
      <button class="backbtn" onclick="closeDetail()">← Назад</button>
    </div>
    ${poisonImg(p,"dphoto")}
    ${(function(){const ph=poisonPhoto(p);return ph&&ph.credit?`<div class="photo-credit">Снимка: ${esc(ph.credit)}${ph.license?" · "+esc(ph.license):""}</div>`:"";})()}
    <div class="dhead">
      <div class="dbadge">☠️ ОТРОВНО — НЕ ЗА УПОТРЕБА</div>
      <h2 class="serif">${p.n}</h2>
      <div class="lat">${p.lat}</div>
      ${p.folk&&p.folk!=="—"?`<div class="folk">Народни имена: ${p.folk}</div>`:""}
    </div>
    <div class="section danger">
      <h4>Защо е опасно</h4>
      <p>${p.what}</p>
    </div>
    <div class="section confuse">
      <h4>С какво се бърка</h4>
      <p>${p.confuse}</p>
    </div>
    <div class="section">
      <h4>Признаци на отравяне</h4>
      <ul>${p.signs.map(s=>`<li>${s}</li>`).join("")}</ul>
    </div>
    <div class="poison-note" style="margin-top:.9rem">При подозрение за отравяне — <b>112</b>. Ако е възможно, покажете растението на медиците.</div>
    <div class="navrow">
      <button onclick="openPoison(${prev})">← ${POISON[prev].n}</button>
      <button onclick="openPoison(${next})">${POISON[next].n} →</button>
    </div>
  `;
  listview.style.display="none";
  detail.style.display="block";
  window.scrollTo({top:0});
}

function render(){
  const q=norm(search.value);
  clearbtn.style.display=q?"block":"none";
  detail.style.display="none";listview.style.display="block";
  renderToday();

  if(q){
    const hits=HERBS.map((h,i)=>({h,i})).filter(({h})=>{
      const hay=norm([h.n,h.lat,h.folk,h.what,h.uses.join(" "),h.ail.map(ailTitle).join(" "),h.ail.join(" ")].join(" "));
      return hay.includes(q);
    });
    const ailHits=AILMENTS.filter(a=>norm(a.t+" "+a.k+" "+a.d).includes(q));
    const poisonHits=POISON.map((p,i)=>({p,i})).filter(({p})=>{
      const hay=norm([p.n,p.lat,p.folk,p.danger,p.what,p.confuse].join(" "));
      return hay.includes(q);
    });
    let html="";
    if(ailHits.length) html+=ailHits.map(a=>ailCard(a,true)).join("");
    if(poisonHits.length) html+=POISON_INTRO+poisonHits.map(({p,i})=>poisonCard(p,i,q)).join("");
    if(hits.length) html+=hits.map(({h,i})=>herbCard(h,i,q)).join("");
    results.innerHTML=html||`<div class="empty">Нищо не е намерено за „${esc(search.value)}“.<br>Опитайте с друга дума — например „кашлица“, „стомах“ или „лайка“.</div>`;
    count.textContent=hits.length?`Намерени билки: ${hits.length}`:"";
    return;
  }

  if(mode==="herbs"){
    results.innerHTML=HERBS.map((h,i)=>herbCard(h,i,"")).join("");
    count.textContent=`Билки в справочника: ${HERBS.length}`;
  }else if(mode==="poison"){
    results.innerHTML=POISON_INTRO+POISON.map((p,i)=>poisonCard(p,i,"")).join("");
    count.textContent=`Отровни растения: ${POISON.length}`;
  }else if(mode==="favs"){
    const list=HERBS.map((h,i)=>({h,i})).filter(x=>favs.has(x.h.id));
    results.innerHTML=list.length
      ? list.map(({h,i})=>herbCard(h,i,"")).join("")
      : `<div class="empty">Нямате запазени любими билки.<br>Отворете билка и натиснете <b style="color:var(--gold)">☆ Запази</b> — тя ще се появи тук.</div>`;
    count.textContent=list.length?`Любими билки: ${list.length}`:"";
  }else{
    results.innerHTML=AILMENTS.map(a=>ailCard(a,false)).join("");
    count.textContent=`Натиснете оплакване, за да видите билките`;
  }
}

function openHerb(i){
  const h=HERBS[i];
  const isFav=favs.has(h.id);
  const prev=(i-1+HERBS.length)%HERBS.length, next=(i+1)%HERBS.length;
  detail.innerHTML=`
    <div class="dtop">
      <button class="backbtn" onclick="closeDetail()">← Назад</button>
      <button class="favbtn ${isFav?"on":""}" id="favbtn" onclick="toggleFav('${h.id}',${i})">${isFav?"★ Запазена":"☆ Запази"}</button>
    </div>
    ${img(h,"dphoto")}
    <div class="dhead">
      <h2 class="serif">${h.n}</h2>
      <div class="lat">${h.lat}</div>
      ${h.folk&&h.folk!=="—"?`<div class="folk">Народни имена: ${h.folk}</div>`:""}
    </div>
    <div class="section"><p>${h.what}</p></div>
    <div class="section">
      <h4>При какво помага</h4>
      <ul>${h.uses.map(u=>`<li>${u}</li>`).join("")}</ul>
    </div>
    <div class="section recipe">
      <h4>Как се приготвя</h4>
      <p>${h.prep}</p>
    </div>
    <div class="section">
      <h4>Колко и кога</h4>
      <p>${h.dose}</p>
    </div>
    <div class="section warn">
      <h4>Внимание</h4>
      <p>${h.warn}</p>
    </div>
    <div class="tagrow">${h.ail.map(k=>`<button class="tag" onclick="goAil('${k}')">${ailTitle(k)}</button>`).join("")}</div>
    <div class="navrow">
      <button onclick="openHerb(${prev})">← ${HERBS[prev].n}</button>
      <button onclick="openHerb(${next})">${HERBS[next].n} →</button>
    </div>
  `;
  listview.style.display="none";
  detail.style.display="block";
  window.scrollTo({top:0});
}

function toggleFav(id,i){
  favs.has(id)?favs.delete(id):favs.add(id);
  saveFavs();
  const b=$("favbtn");
  b.classList.toggle("on",favs.has(id));
  b.textContent=favs.has(id)?"★ Запазена":"☆ Запази";
}

function goAil(k){
  mode="ails";setTabs();search.value="";
  openAils.add(k);
  render();
  const el=document.getElementById("ail-"+k);
  if(el)el.scrollIntoView({block:"start"});
}

function closeDetail(){
  detail.style.display="none";
  listview.style.display="block";
}

$("tabHerbs").onclick=()=>{mode="herbs";setTabs();search.value="";render()};
$("tabAils").onclick=()=>{mode="ails";setTabs();search.value="";render()};
$("tabPoison").onclick=()=>{mode="poison";setTabs();search.value="";render()};
$("tabFavs").onclick=()=>{mode="favs";setTabs();search.value="";render()};
function setTabs(){
  $("tabHerbs").classList.toggle("active",mode==="herbs");
  $("tabAils").classList.toggle("active",mode==="ails");
  $("tabPoison").classList.toggle("active",mode==="poison");
  $("tabFavs").classList.toggle("active",mode==="favs");
}
search.addEventListener("input",render);
clearbtn.onclick=()=>{search.value="";render();search.focus()};
$("fontbtn").onclick=()=>{
  document.body.classList.toggle("big");
  $("fontbtn").textContent=document.body.classList.contains("big")?"А−":"А+";
};

const totop=$("totop");
window.addEventListener("scroll",()=>{
  totop.style.display=window.scrollY>500?"block":"none";
});
totop.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

render();
</script>
</body>
</html>
