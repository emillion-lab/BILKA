name: Вграждане на снимки на отровните растения

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'embed_poison_photos.py'
      - '.github/workflows/embed-photos.yml'

permissions:
  contents: write

jobs:
  embed:
    runs-on: ubuntu-latest
    steps:
      - name: Клониране на репото
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Инсталиране на зависимости
        run: pip install requests pillow

      - name: Сваляне и вграждане на снимките
        run: python3 embed_poison_photos.py

      - name: Записване на промените
        run: |
          if git diff --quiet -- index.html; then
            echo "Няма промяна в index.html — снимките вече са актуални."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Автоматично вграждане на снимки на отровните растения"
            git push
          fi
